<body>
<button id="play-pause-btn" class="btn">۶ৎ</button>
<!-- Música -->
<audio id="audio" loop>
  <source src="https://cdn.discordapp.com/attachments/1478133635986096208/1491194699174908144/aa.mp3?ex=69d6cec9&is=69d57d49&hm=67e8253c7a131ba391a241d7a57bc0b2ef3e723a98a3f41b4bbb334918df5a75&" type="audio/mpeg" />
</audio>
</body>
<script>
  const audio = document.getElementById('audio');
  const progress = document.getElementById('progress');
  const progressContainer = document.getElementById('progress-container');
  const playPauseBtn = document.getElementById('play-pause-btn');

  function playMedia() {
    audio.play();
    playPauseBtn.textContent = '۶ৎ';
  }

  function pauseMedia() {
    audio.pause();
    playPauseBtn.textContent = '۶ৎ';
  }

  playPauseBtn.addEventListener('click', () => {
    if (audio.paused) {
      playMedia();
    } else {
      pauseMedia();
    }
  });

  audio.addEventListener('timeupdate', () => {
    const percent = (audio.currentTime / audio.duration) * 100;
    progress.style.width = percent + '%';
  });

  progressContainer.addEventListener('click', (e) => {
    const rect = progressContainer.getBoundingClientRect();
    const clickX = e.clientX - rect.left;
    const width = rect.width;
    const newTime = (clickX / width) * audio.duration;
    audio.currentTime = newTime;
  });

  window.addEventListener('click', () => {
    if (audio.paused) {
      playMedia();
    }
  }, { once: true });
</script>
